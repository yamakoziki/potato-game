<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>じゃがいもマスター〜ネパール農家への道〜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Fredoka+One&display=swap');

  :root {
    --earth: #5c3d1e;
    --soil: #8B5E3C;
    --grass: #4a7c3f;
    --sky: #7eb8d4;
    --sun: #f5a623;
    --potato: #c8a85a;
    --danger: #c0392b;
    --safe: #27ae60;
    --card-bg: #fdf6e3;
    --shadow: rgba(0,0,0,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(180deg, #a8d5e8 0%, #c5e8b0 40%, #8B5E3C 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: #fdf6e3;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
  }

  /* ===== HEADER ===== */
  #header {
    background: linear-gradient(135deg, #4a7c3f, #2d5a27);
    color: white;
    padding: 12px 16px 8px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  #header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    letter-spacing: 1px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
  }

  #header .subtitle {
    font-size: 0.65rem;
    opacity: 0.85;
    margin-top: 1px;
  }

  .score-bar {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .score-item {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 3px 8px;
    font-size: 0.65rem;
    display: flex;
    align-items: center;
    gap: 3px;
    backdrop-filter: blur(4px);
  }

  .score-item .val {
    font-weight: 900;
    font-size: 0.75rem;
  }

  .score-item.positive .val { color: #a8ff78; }
  .score-item.negative .val { color: #ff8080; }

  /* ===== MAIN CONTENT ===== */
  #main {
    padding: 16px;
    min-height: calc(100vh - 120px);
  }

  /* ===== PHASE INDICATOR ===== */
  .phase-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .phase-badge {
    background: var(--earth);
    color: white;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.7rem;
    font-weight: 700;
  }

  .phase-name {
    font-size: 0.75rem;
    color: #666;
  }

  .phase-dots {
    display: flex;
    gap: 3px;
    margin-left: auto;
  }

  .phase-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ddd;
  }
  .phase-dot.done { background: var(--grass); }
  .phase-dot.current { background: var(--sun); }

  /* ===== SCENE CARD ===== */
  .scene-card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 4px 16px var(--shadow);
    border-left: 5px solid var(--grass);
    animation: slideIn 0.4s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scene-emoji {
    font-size: 3rem;
    text-align: center;
    margin-bottom: 8px;
    display: block;
  }

  .scene-title {
    font-size: 1.05rem;
    font-weight: 900;
    color: var(--earth);
    margin-bottom: 6px;
    text-align: center;
  }

  .scene-desc {
    font-size: 0.82rem;
    color: #444;
    line-height: 1.7;
    margin-bottom: 10px;
  }

  .season-badge {
    display: inline-block;
    background: var(--sun);
    color: white;
    border-radius: 8px;
    padding: 2px 8px;
    font-size: 0.65rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  /* ===== TRAP EVENT ===== */
  .trap-card {
    background: linear-gradient(135deg, #fff3f3, #ffe0e0);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    border: 2px solid var(--danger);
    animation: shake 0.5s ease, slideIn 0.4s ease;
    box-shadow: 0 4px 20px rgba(192,57,43,0.2);
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .trap-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .trap-icon { font-size: 1.8rem; }

  .trap-label {
    background: var(--danger);
    color: white;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .trap-title {
    font-size: 1rem;
    font-weight: 900;
    color: var(--danger);
    margin-bottom: 6px;
  }

  .trap-desc {
    font-size: 0.8rem;
    color: #555;
    line-height: 1.7;
  }

  /* ===== CHOICES ===== */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }

  .choice-btn {
    background: white;
    border: 2px solid #e0d5c0;
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .choice-btn:active {
    transform: scale(0.97);
  }

  .choice-btn:hover {
    border-color: var(--grass);
    background: #f0fff0;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(74,124,63,0.2);
  }

  .choice-btn .choice-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--grass);
    margin-bottom: 3px;
  }

  .choice-btn .choice-text {
    font-size: 0.85rem;
    color: #333;
    font-weight: 700;
    line-height: 1.4;
  }

  .choice-btn .choice-hint {
    font-size: 0.68rem;
    color: #888;
    margin-top: 3px;
  }

  /* ===== RESULT ===== */
  .result-card {
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    animation: slideIn 0.4s ease;
  }

  .result-good {
    background: linear-gradient(135deg, #e8f8e8, #d0f0d0);
    border: 2px solid var(--safe);
  }

  .result-bad {
    background: linear-gradient(135deg, #fff3f3, #ffe0e0);
    border: 2px solid var(--danger);
  }

  .result-neutral {
    background: linear-gradient(135deg, #f8f4e8, #f0e8d0);
    border: 2px solid var(--soil);
  }

  .result-title {
    font-size: 1rem;
    font-weight: 900;
    margin-bottom: 8px;
  }

  .result-desc {
    font-size: 0.8rem;
    color: #444;
    line-height: 1.7;
    margin-bottom: 10px;
  }

  .score-changes {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .score-change {
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.7rem;
    font-weight: 700;
  }

  .score-change.up { background: #d4edda; color: #155724; }
  .score-change.down { background: #f8d7da; color: #721c24; }

  /* ===== KNOWLEDGE CARD ===== */
  .knowledge-card {
    background: linear-gradient(135deg, #fff9e6, #ffeeba);
    border: 2px solid var(--potato);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 14px;
    animation: cardPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
  }

  @keyframes cardPop {
    0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .knowledge-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card-new-badge {
    background: var(--sun);
    color: white;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.6rem;
    font-weight: 700;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .knowledge-title {
    font-size: 0.95rem;
    font-weight: 900;
    color: var(--earth);
    margin-bottom: 6px;
  }

  .knowledge-text {
    font-size: 0.78rem;
    color: #555;
    line-height: 1.7;
  }

  .card-icon { font-size: 2rem; }

  /* ===== NEXT BTN ===== */
  .next-btn {
    width: 100%;
    background: linear-gradient(135deg, #4a7c3f, #2d5a27);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(74,124,63,0.4);
    margin-bottom: 16px;
  }

  .next-btn:active { transform: scale(0.97); }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(74,124,63,0.5); }

  /* ===== SETUP SCREEN ===== */
  .setup-screen {
    padding: 20px;
    text-align: center;
  }

  .setup-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--earth);
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .setup-subtitle {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 20px;
  }

  .setup-potato {
    font-size: 5rem;
    margin: 16px 0;
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .setup-section {
    background: white;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 14px;
    box-shadow: 0 2px 10px var(--shadow);
    text-align: left;
  }

  .setup-section h3 {
    font-size: 0.85rem;
    color: var(--earth);
    font-weight: 900;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .option-btn {
    border: 2px solid #e0d5c0;
    border-radius: 10px;
    padding: 10px 8px;
    background: white;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .option-btn.selected {
    border-color: var(--grass);
    background: #f0fff0;
    box-shadow: 0 0 0 2px var(--grass);
  }

  .option-btn .opt-emoji { font-size: 1.6rem; display: block; margin-bottom: 4px; }
  .option-btn .opt-name { font-size: 0.75rem; font-weight: 700; color: #333; }
  .option-btn .opt-desc { font-size: 0.6rem; color: #888; margin-top: 2px; }

  .start-btn {
    width: 100%;
    background: linear-gradient(135deg, #f5a623, #e67e22);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 1.1rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(245,166,35,0.5);
    margin-top: 8px;
  }

  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,166,35,0.6); }
  .start-btn:active { transform: scale(0.97); }

  /* ===== GAMEOVER ===== */
  .gameover-screen {
    text-align: center;
    padding: 20px;
  }

  .gameover-emoji { font-size: 5rem; margin: 20px 0; }

  .gameover-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--danger);
    margin-bottom: 8px;
  }

  .gameover-desc {
    font-size: 0.85rem;
    color: #555;
    line-height: 1.8;
    margin-bottom: 20px;
  }

  /* ===== FINAL RESULT ===== */
  .final-screen {
    text-align: center;
    padding: 16px;
  }

  .final-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--earth);
    margin-bottom: 4px;
  }

  .rank-display {
    font-size: 3.5rem;
    margin: 16px 0 8px;
  }

  .rank-name {
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--sun);
    margin-bottom: 4px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
  }

  .final-scores {
    background: white;
    border-radius: 14px;
    padding: 14px;
    margin: 14px 0;
    box-shadow: 0 4px 16px var(--shadow);
  }

  .final-score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid #f0e8d0;
    font-size: 0.85rem;
  }

  .final-score-row:last-child { border-bottom: none; }

  .score-bar-visual {
    height: 8px;
    border-radius: 4px;
    background: #f0e8d0;
    flex: 1;
    margin: 0 10px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--grass), var(--sun));
    transition: width 1s ease;
  }

  .cards-collected {
    background: linear-gradient(135deg, #fff9e6, #ffeeba);
    border: 2px solid var(--potato);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 14px;
  }

  .cards-collected h3 {
    font-size: 0.85rem;
    font-weight: 900;
    color: var(--earth);
    margin-bottom: 8px;
  }

  .card-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .card-chip {
    background: white;
    border: 1px solid var(--potato);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.65rem;
    color: var(--earth);
  }

  .retry-btn {
    width: 100%;
    background: linear-gradient(135deg, #4a7c3f, #2d5a27);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 900;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    margin-bottom: 10px;
    box-shadow: 0 4px 12px rgba(74,124,63,0.4);
  }

  /* ===== CARDS ALBUM BTN ===== */
  .album-fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--sun), #e67e22);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    box-shadow: 0 4px 16px rgba(245,166,35,0.5);
    cursor: pointer;
    z-index: 200;
    border: none;
    transition: transform 0.2s;
  }

  .album-fab:hover { transform: scale(1.1); }
  .album-fab .badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--danger);
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 0.65rem;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== ALBUM OVERLAY ===== */
  .album-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    animation: fadeIn 0.3s;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .album-panel {
    background: #fdf6e3;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 75vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .album-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--earth);
    text-align: center;
    margin-bottom: 16px;
  }

  .album-card {
    background: linear-gradient(135deg, #fff9e6, #ffeeba);
    border: 2px solid var(--potato);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .album-card .card-icon { font-size: 2rem; flex-shrink: 0; }
  .album-card .card-body { flex: 1; }
  .album-card .card-title { font-size: 0.85rem; font-weight: 900; color: var(--earth); margin-bottom: 4px; }
  .album-card .card-text { font-size: 0.72rem; color: #555; line-height: 1.6; }

  .album-empty {
    text-align: center;
    color: #aaa;
    font-size: 0.85rem;
    padding: 20px;
  }

  .close-btn {
    width: 100%;
    background: var(--earth);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    margin-top: 10px;
  }

  /* ===== DEAD SCREEN ===== */
  .dead-plant {
    font-size: 5rem;
    text-align: center;
    margin: 20px 0;
    animation: wilt 1s ease forwards;
  }

  @keyframes wilt {
    from { transform: rotate(0deg); filter: none; }
    to { transform: rotate(-15deg); filter: grayscale(1); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>🥔 じゃがいもマスター</h1>
    <div class="subtitle">〜ネパール農家への道〜</div>
    <div class="score-bar" id="score-bar"></div>
  </div>
  <div id="main"></div>
  <button class="album-fab" id="album-btn" style="display:none" onclick="showAlbum()">
    🃏<span class="badge" id="card-badge">0</span>
  </button>
</div>

<script>
// ===== STATE =====
const state = {
  screen: 'setup',
  season: null,      // 'summer' or 'winter'
  region: null,      // 'terai', 'hill', 'mountain'
  phase: 0,
  scores: { harvest: 50, quality: 50, health: 50, env: 50, community: 50 },
  cards: [],
  pendingCard: null,
  gameOver: false,
  history: []
};

// ===== KNOWLEDGE CARDS =====
const KNOWLEDGE_CARDS = {
  variety_jyoti: {
    icon: '🌱',
    title: 'クフリ・ジョティとは',
    text: 'ネパール最普及品種。収量安定だが疫病に弱い。モンスーン前の早めの防除が鍵。山岳地帯の夏作にも適応。'
  },
  late_blight: {
    icon: '🍃',
    title: '疫病（レイトブライト）',
    text: '低温多湿で爆発的に発生。葉の水浸状斑点が最初のサイン。マンコゼブ散布は発症前の予防散布が効果的。発症後は手遅れになりやすい。'
  },
  seed_virus: {
    icon: '🦠',
    title: '自家採種のウイルスリスク',
    text: '毎年同じ種芋を使うと、ウイルスが蓄積して収量が落ちる。3〜4年ごとに認定種芋（NARC）を使うことで収量が最大30%改善する。'
  },
  monsoon_drain: {
    icon: '🌧️',
    title: 'モンスーン対策の排水',
    text: 'テライ平野では6〜9月に豪雨が集中。畝を高くし、排水溝を事前に掘ることが被害ゼロへの鍵。段々畑では土壌侵食も要注意。'
  },
  fertilizer_balance: {
    icon: '⚖️',
    title: '施肥バランスの重要性',
    text: '窒素過多は茎葉ばかり茂り、イモが小さくなる（過繁茂）。カリが不足するとイモの品質が低下。牛糞堆肥+少量の化学肥料が理想的。'
  },
  hilling: {
    icon: '⛰️',
    title: '培土（土寄せ）のタイミング',
    text: '株高20〜25cmで第1回培土。遅れると緑化イモが発生し、ソラニンが生成されて食べられなくなる。培土は1〜2回が基本。'
  },
  scab_ph: {
    icon: '🧪',
    title: 'そうか病と土壌pH',
    text: 'そうか病はアルカリ土壌（pH7以上）で多発。テライ石灰質土壌では特に注意。硫黄資材でpH5.2〜5.5に調整すると発生を抑えられる。'
  },
  storage_curing: {

function getSalesChoices() {
  const h = state.scores.harvest;
  const q = state.scores.quality;
  const choices = [];

  // 常に選択可能：市場（ハート）販売
  choices.push({
    id: 'market',
    icon: '🏪',
    name: '市場（ハート）販売',
    price: '低〜中',
    work: '少ない',
    risk: '低い',
    desc: '地元の市場に持ち込む。手軽だが収穫期は価格が低い。',
    available: true,
    result: {
      type: 'neutral',
      title: '市場で販売完了',
      desc: '手軽に売れたが、収穫期は出回り量が多く価格は低め。来年は販売タイミングを工夫したい。',
      scores: { community: +5 },
      card: 'market_timing'
    }
  });

  // 常に選択可能：仲買人
  choices.push({
    id: 'broker',
    icon: '🤝',
    name: '仲買人への販売',
    price: '中',
    work: '少ない',
    risk: '中',
    desc: '仲買人が畑まで引き取りに来る。交渉次第で価格が変わる。',
    available: true,
    result: {
      type: h >= 60 ? 'good' : 'neutral',
      title: h >= 60 ? '仲買人と好条件で契約！' : '仲買人に買い叩かれた…',
      desc: h >= 60
        ? '収量が多かったので仲買人も好条件を提示。まとまった収入になった。'
        : '収量が少なく足元を見られた。価格交渉で不利になってしまった。',
      scores: h >= 60
        ? { harvest: +8, community: +5 }
        : { harvest: -5, community: -5 },
      card: 'broker_risk'
    }
  });

  // 高品質の場合のみ：個人・直売販売
  if (q >= 60) {
    choices.push({
      id: 'direct',
      icon: '🛒',
      name: '個人・直売販売',
      price: '高い',
      work: '多い',
      risk: '中',
      desc: '消費者に直接販売。高値だが輸送・販売の手間がかかる。',
      available: true,
      result: {
        type: 'good',
        title: '直売で高収入！',
        desc: '品質の良さが消費者に伝わり、高値で完売。常連客もできて次シーズンも期待できる。',
        scores: { harvest: +15, quality: +5, community: +15 },
        card: 'direct_sales'
      }
    });
  } else {
    choices.push({
      id: 'direct_locked',
      icon: '🔒',
      name: '個人・直売販売',
      price: '高い',
      work: '多い',
      risk: '中',
      desc: '品質スコアが60以上で解放。消費者に直接販売できれば高収入。',
      available: false,
      lockReason: `品質スコア不足（現在: ${q}点 / 必要: 60点以上）`
    });
  }

  // 農協・契約栽培（収量+品質の合計が高い場合）
  if (h >= 55 && q >= 55) {
    choices.push({
      id: 'coop',
      icon: '🤲',
      name: '農協・契約栽培出荷',
      price: '中〜高（安定）',
      work: '中程度',
      risk: '低い',
      desc: '事前契約に基づく安定出荷。品質・数量基準を満たせば確実に売れる。',
      available: true,
      result: {
        type: 'good',
        title: '農協契約で安定収入！',
        desc: '品質・収量ともに基準をクリア。安定した価格で全量買い取ってもらえた。農協の技術指導も受けられる。',
        scores: { harvest: +10, quality: +8, community: +20, env: +5 },
        card: 'cooperative'
      }
    });
  } else {
    choices.push({
      id: 'coop_locked',
      icon: '🔒',
      name: '農協・契約栽培出荷',
      price: '中〜高（安定）',
      work: '中程度',
      risk: '低い',
      desc: '収穫量・品質スコアが共に55以上で解放。安定した契約販売が可能。',
      available: false,
      lockReason: `収穫量(${h})・品質(${q})スコアが両方55以上必要`
    });
  }

  return choices;
}

function makeSalesChoice(i) {
  const choices = getSalesChoices();
  const choice = choices[i];
  if (!choice || !choice.available) return;

  const result = choice.result;
  applyScores(result.scores);

  if (result.card && !state.cards.includes(result.card)) {
    state.cards.push(result.card);
  }

  // 販売先の名前を結果に埋め込む
  state.lastResult = {
    ...result,
    salesChannel: choice.name,
    salesIcon: choice.icon
  };
  state.screen = 'sales_result';
  render();
}

function renderSalesResult(main) {
  const result = state.lastResult;
  const cls = result.type === 'good' ? 'result-good' : result.type === 'bad' ? 'result-bad' : 'result-neutral';
  const icon = result.type === 'good' ? '✅' : result.type === 'bad' ? '❌' : '⚠️';

  const scoreChanges = Object.entries(result.scores).map(([k, v]) => {
    if (v === 0) return '';
    const label = SCORE_LABELS.find(s => s.key === k);

    return `<div class="score-change ${cls2}">${label.emoji}${v > 0 ? '+' : ''}${v}</div>`;
  }).join('');

  let cardHtml = '';
  if (result.card && KNOWLEDGE_CARDS[result.card]) {
    const card = KNOWLEDGE_CARDS[result.card];
    cardHtml = `
      <div class="knowledge-card">
        <div class="knowledge-header">

      <div class="score-changes">${scoreChanges}</div>

    ${cardHtml}
    <button class="next-btn" onclick="goToFinal()">🏁 最終結果を見る</button>

}

function goToFinal() {
  state.screen = 'final';
  render();
}
const SCORE_LABELS = [
  { key: 'harvest', label: '🥔収穫量', emoji: '🥔' },
  { key: 'quality', label: '⭐品質', emoji: '⭐' },
  { key: 'health', label: '🧑‍🤝‍🧑人体', emoji: '🧑' },
  { key: 'env', label: '🌿環境', emoji: '🌿' },
  { key: 'community', label: '🏘地域', emoji: '🏘' }
];

// ===== RENDER =====
function render() {
  const main = document.getElementById('main');
  const header = document.getElementById('header');
  const albumBtn = document.getElementById('album-btn');
  const scorebar = document.getElementById('score-bar');

  // Score bar
  if (state.screen !== 'setup') {
    scorebar.innerHTML = SCORE_LABELS.map(s => {
      const v = state.scores[s.key];
      const cls = v >= 50 ? 'positive' : 'negative';
      return `<div class="score-item ${cls}">${s.emoji}<span class="val">${v}</span></div>`;
    }).join('');
    albumBtn.style.display = 'flex';
    document.getElementById('card-badge').textContent = state.cards.length;
  } else {
    scorebar.innerHTML = '';
    albumBtn.style.display = 'none';
  }

  if (state.screen === 'setup') renderSetup(main);
  else if (state.screen === 'phase') {
    const phase = PHASES[state.phase];
    if (phase && phase.isSales) renderSalesPhase(main);
    else renderPhase(main);
  }
  else if (state.screen === 'result') renderResult(main);
  else if (state.screen === 'sales_result') renderSalesResult(main);
  else if (state.screen === 'trap') renderTrap(main);
  else if (state.screen === 'trap_result') renderTrapResult(main);
  else if (state.screen === 'gameover') renderGameOver(main);
  else if (state.screen === 'final') renderFinal(main);
}

}

function renderFinal(main) {
  const total = Object.values(state.scores).reduce((a,b) => a+b, 0);
  const avg = Math.round(total / 5);

  let rank, rankEmoji, rankDesc;
  if (avg >= 85) { rank = 'じゃがいも名人'; rankEmoji = '🏆'; rankDesc = '完璧な栽培管理で最高の収穫！ネパール農業の未来を担う存在です。'; }
  else if (avg >= 70) { rank = 'ベテラン農家'; rankEmoji = '🥇'; rankDesc = '安定した栽培技術で高品質なジャガイモを生産。地域の模範的な農家です。'; }
  else if (avg >= 55) { rank = '一人前の農家'; rankEmoji = '🥈'; rankDesc = 'バランスの取れた栽培ができています。さらなる技術向上を目指して！'; }
  else if (avg >= 40) { rank = '見習い農家'; rankEmoji = '🥉'; rankDesc = 'まだ学ぶことが多いですが、基礎は身についています。経験を積みましょう。'; }
  else { rank = '農業初心者'; rankEmoji = '🌱'; rankDesc = '失敗を恐れずに！知識カードを活用して再挑戦してみてください。'; }

  const scoreRows = SCORE_LABELS.map(s => {
    const v = state.scores[s.key];
    const pct = Math.max(0, Math.min(100, v));
    return `
      <div class="final-score-row">
        <span>${s.label}</span>
        <div class="score-bar-visual"><div class="score-bar-fill" style="width:${pct}%"></div></div>
        <span style="font-weight:900;min-width:36px;text-align:right">${v}</span>
      </div>
    `;
  }).join('');

  main.innerHTML = `
    <div class="final-screen">
      <div class="final-title">🌾 収穫完了！</div>
      <div class="rank-display">${rankEmoji}</div>
      <div class="rank-name">${rank}</div>
      <p style="font-size:0.78rem;color:#666;margin-bottom:14px;line-height:1.6">${rankDesc}</p>
      <div class="final-scores">
        <div style="font-size:0.8rem;font-weight:900;color:#888;margin-bottom:8px">スコア詳細（平均: ${avg}点）</div>
        ${scoreRows}
      </div>
      ${state.cards.length > 0 ? `
        <div class="cards-collected">
          <h3>📚 集めた知識カード（${state.cards.length}枚）</h3>
          <div class="card-chips">
            ${state.cards.map(id => {
              const c = KNOWLEDGE_CARDS[id];
              return c ? `<div class="card-chip">${c.icon} ${c.title}</div>` : '';
            }).join('')}
          </div>
        </div>
      ` : ''}
      <button class="retry-btn" onclick="restartGame()">🔄 もう一度挑戦する</button>
    </div>
  `;

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(el => {
      el.style.width = el.style.width;
    });
  }, 100);
}

// ===== ACTIONS =====
function selectSeason(s) { state.season = s; render(); }
function selectRegion(r) { state.region = r; render(); }

function startGame() {
  if (!state.season || !state.region) return;
  state.screen = 'phase';
  state.phase = 0;
  state.scores = { harvest: 50, quality: 50, health: 50, env: 50, community: 50 };
  state.cards = [];
  state.gameOver = false;
  render();
}

function makeChoice(i) {
  const phase = PHASES[state.phase];
  const choice = phase.choices[i];
  const result = choice.result;

  // Apply scores
  applyScores(result.scores);

  // Collect card
  if (result.card && !state.cards.includes(result.card)) {
    state.cards.push(result.card);
  }

  state.lastResult = result;
  state.screen = 'result';

  // Check game over
  if (checkGameOver()) return;

  render();
}

function applyScores(changes) {
  Object.entries(changes).forEach(([k, v]) => {
    state.scores[k] = Math.max(0, Math.min(100, (state.scores[k] || 50) + v));
  });
}

function checkGameOver() {
  if (state.scores.harvest <= 5) {
    state.gameOverReason = '収穫量スコアがゼロになりました。作物が枯れてしまいました。';
    state.screen = 'gameover';
    render();
    return true;
  }
  return false;
}

function nextPhase() {
  // Check for trap event before next phase
  const nextPhaseIndex = state.phase + 1;
  const traps = TRAP_EVENTS[state.season] || [];
  const trap = traps.find(t => t.phase === nextPhaseIndex && !state.history.includes('trap_' + t.id));

  if (trap) {
    state.currentTrap = trap;
    state.history.push('trap_' + trap.id);
    state.screen = 'trap';
    render();
    return;
  }

  state.phase++;
  if (state.phase >= PHASES.length) {
    state.screen = 'final';
  } else {
    state.screen = 'phase';
  }
  render();
}

function continueAfterTrap() {
  state.phase++;
  if (state.phase >= PHASES.length) {
    state.screen = 'final';
  } else {
    state.screen = 'phase';
  }
  render();
}

function makeTrapChoice(i) {
  const trap = state.currentTrap;
  const choice = trap.choices[i];
  const result = choice.result;

  applyScores(result.scores);

  if (result.card && !state.cards.includes(result.card)) {
    state.cards.push(result.card);
  }

  state.lastTrapResult = result;
  state.screen = 'trap_result';

  if (checkGameOver()) return;

  render();
}

function restartGame() {
  state.screen = 'setup';
  state.phase = 0;
  state.scores = { harvest: 50, quality: 50, health: 50, env: 50, community: 50 };
  state.cards = [];
  state.history = [];
  state.gameOver = false;
  render();
}

// ===== ALBUM =====
function showAlbum() {
  const overlay = document.createElement('div');
  overlay.className = 'album-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const cardsHtml = state.cards.length === 0
    ? '<div class="album-empty">まだカードがありません。<br>良い選択をすると獲得できます！</div>'
    : state.cards.map(id => {
        const c = KNOWLEDGE_CARDS[id];
        if (!c) return '';
        return `
          <div class="album-card">
            <span class="card-icon">${c.icon}</span>
            <div class="card-body">
              <div class="card-title">${c.title}</div>
              <div class="card-text">${c.text}</div>
            </div>
          </div>
        `;
      }).join('');

  overlay.innerHTML = `
    <div class="album-panel">
      <div class="album-title">📚 知識カード図鑑（${state.cards.length}枚）</div>
      ${cardsHtml}
      <button class="close-btn" onclick="document.querySelector('.album-overlay').remove()">閉じる</button>
    </div>
  `;

  document.body.appendChild(overlay);
}

// ===== INIT =====
render();
</script>
